# backlog-board 設定ファイル
# 配置先: ~/.config/backlog-board/config.toml
# (XDG_CONFIG_HOME を設定している場合は $XDG_CONFIG_HOME/backlog-board/config.toml)
#
# 秘密 (BACKLOG_API_KEY) とデバッグ用 (LOG_LEVEL) のみ環境変数で渡す。
# それ以外の設定はすべてこのファイルで管理する。

# 必須: Backlog スペースのドメイン
domain = "yourspace.backlog.com"

# 任意: bind アドレス (デフォルト 127.0.0.1)
# LAN/公衆 Wi-Fi 上の他端末から見えるため、"0.0.0.0" は絶対に避ける。
# どうしても LAN 公開が必要な場合のみ変更し、その上で別途認証等を入れること。
# listen_addr = "127.0.0.1"

# 任意: サーバーポート (デフォルト 8082)
# port = "8082"

# 任意: snapshot.json の保存先パス
# デフォルト: ~/.local/share/backlog-board/snapshot.json
# cache_path = "/path/to/snapshot.json"

# 任意: graceful shutdown のタイムアウト (デフォルト 10s)
# shutdown_timeout = "10s"

# 任意: バックグラウンドフェッチの間隔 (デフォルト 15m)
# fetch_interval = "15m"

# 任意: コメント本文中の [text](url) を <a href> として有効化する URL prefix。
# 自テナント (https://<domain>/) は自動で許可されるため、ここには
# それ以外で許可したい外部 URL を列挙する。空の場合は外部 URL は無効化される (href="#")。
# 例: GitHub の自社 org の特定リポジトリのみ許可:
# allowed_link_prefixes = ["https://github.com/<org>/<repo>/"]
